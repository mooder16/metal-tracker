name: Scrape and Deploy to GitHub Pages

on:
  schedule:
    # 每天台灣時間 8:00, 14:00, 20:00 自動更新（UTC 0:00, 6:00, 12:00）
    - cron: "0 0,6,12 * * *"
  workflow_dispatch:
    inputs:
      history_days:
        description: "走勢天數"
        required: true
        default: "365"
        type: choice
        options:
          - "60"
          - "180"
          - "365"

concurrency:
  group: metal-scrape
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Puppeteer browser
        run: npx puppeteer browsers install chrome

      - name: Run metal scraper
        run: node scripts/scrape-metals.js ${{ github.event.inputs.history_days || '365' }}

      - name: Commit updated data
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add public/data/metals.json
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "chore: update metal prices [$(date +'%Y-%m-%d %H:%M UTC')]"
            for i in 1 2 3; do
              git push && break
              git pull --rebase
            done
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: false
