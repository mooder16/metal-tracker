<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金屬期貨價格追蹤器</title>
  <!-- Chart.js CDN -->
  <script src="node_modules/chart.js/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e0e0e0;
      min-height: 100vh;
      padding: 16px;
    }

    .header {
      text-align: center;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(100,200,255,0.4);
    }
    .header p {
      font-size: 12px;
      color: #8899aa;
      margin-top: 3px;
    }

    .toolbar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 8px 20px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Microsoft JhengHei', sans-serif;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      box-shadow: 0 4px 15px rgba(102,126,234,0.4);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102,126,234,0.6);
    }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .range-group {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 4px;
    }
    .range-label {
      font-size: 11px;
      color: #8899aa;
      padding: 0 6px 0 8px;
      white-space: nowrap;
    }
    .btn-range {
      padding: 6px 14px;
      border: none;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: #99aabb;
      transition: all 0.2s ease;
      font-family: 'Microsoft JhengHei', sans-serif;
    }
    .btn-range:hover:not(:disabled) {
      color: #fff;
      background: rgba(255,255,255,0.08);
    }
    .btn-range.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      box-shadow: 0 2px 10px rgba(102,126,234,0.35);
    }
    .btn-range:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .last-update {
      font-size: 11px;
      color: #556;
      text-align: center;
      margin-bottom: 12px;
    }

    .progress-bar-container {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-bottom: 12px;
      overflow: hidden;
      display: none;
    }
    .progress-bar-container.visible { display: block; }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 2px;
      transition: width 0.5s ease;
      width: 0%;
    }

    /* 卡片網格：2欄 */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (max-width: 700px) {
      .cards-grid { grid-template-columns: 1fr; }
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 14px 16px 12px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
    .card:hover {
      border-color: rgba(255,255,255,0.22);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--card-color, #667eea);
      border-radius: 14px 14px 0 0;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .card-icon { font-size: 22px; line-height: 1; }
    .card-title { flex: 1; }
    .card-name { font-size: 16px; font-weight: 700; color: #fff; }
    .card-name-en { font-size: 10px; color: #778899; margin-top: 1px; }

    .card-status {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
    }
    .card-status.loading { background: #f0a500; animation: pulse 1s infinite; }
    .card-status.success { background: #00c853; }
    .card-status.error   { background: #ff5252; }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    .card-price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }
    .card-price {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
      min-height: 36px;
      display: flex;
      align-items: center;
    }
    .card-price.error-text { font-size: 13px; color: #ff5252; font-weight: 400; }
    .card-unit { font-size: 11px; color: #778899; }

    .card-date {
      font-size: 11px;
      color: #556677;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-refresh-btn {
      font-size: 11px;
      color: #aaa;
      background: rgba(255,255,255,0.08);
      border: none;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .card-refresh-btn:hover:not(:disabled) { background: rgba(255,255,255,0.15); color: #fff; }
    .card-refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Chart 容器 */
    .chart-container {
      position: relative;
      height: 130px;
      width: 100%;
    }
    .chart-placeholder {
      height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #445;
      font-size: 12px;
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: 8px;
    }

    /* shimmer */
    .shimmer {
      background: linear-gradient(90deg,
        rgba(255,255,255,0.05) 25%,
        rgba(255,255,255,0.1) 50%,
        rgba(255,255,255,0.05) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
      height: 32px;
      width: 70%;
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }

    .status-bar {
      text-align: center;
      font-size: 11px;
      color: #556;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📊 金屬期貨價格追蹤器</h1>
    <p>數據來源：MacroMicro 財經M平方</p>
  </div>

  <div class="toolbar">
    <button class="btn btn-primary" id="refreshAllBtn" onclick="refreshAll()">
      🔄 更新所有價格
    </button>
    <div class="range-group">
      <span class="range-label">走勢區間</span>
      <button class="btn-range active" id="range60" onclick="selectRange(60)">60天</button>
      <button class="btn-range" id="range180" onclick="selectRange(180)">半年</button>
      <button class="btn-range" id="range365" onclick="selectRange(365)">一年</button>
    </div>
  </div>

  <div class="progress-bar-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="last-update" id="lastUpdate">尚未更新</div>

  <div class="cards-grid" id="cardsGrid"></div>

  <div class="status-bar" id="statusBar">準備就緒</div>

  <script>
    let commodities = [];
    let isFetching = false;
    let fetchedCount = 0;
    let selectedRangeDays = 60;
    let loadedRangeDays = 0;
    const chartInstances = {};
    const dataCache = {};

    const RANGE_LABELS = {
      60: '60天',
      180: '半年',
      365: '一年'
    };

    async function init() {
      commodities = await window.electronAPI.getCommodities();
      renderCards();

      window.electronAPI.onFetchProgress((data) => {
        if (data.status === 'loading') {
          setCardLoading(data.id);
        } else if (data.status === 'done') {
          updateCard(data.id, data.data);
          fetchedCount++;
          updateProgress(fetchedCount, commodities.length);
        }
      });
    }

    function renderCards() {
      const grid = document.getElementById('cardsGrid');
      grid.innerHTML = '';
      commodities.forEach(c => {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${c.id}`;
        card.style.setProperty('--card-color', c.color);
        card.innerHTML = `
          <div class="card-header">
            <span class="card-icon">${c.icon}</span>
            <div class="card-title">
              <div class="card-name">${c.name}</div>
              <div class="card-name-en">${c.nameEn}</div>
            </div>
            <div class="card-status" id="status-${c.id}"></div>
          </div>
          <div class="card-price-row">
            <div class="card-price" id="price-${c.id}">--</div>
            <div class="card-unit">${c.unit}</div>
          </div>
          <div class="card-date" id="date-${c.id}">
            <span id="dateText-${c.id}">點擊更新以取得數據</span>
            <button class="card-refresh-btn" id="refreshBtn-${c.id}" onclick="refreshSingle('${c.id}')">↻ 更新</button>
          </div>
          <div class="chart-container" id="chartContainer-${c.id}">
            <div class="chart-placeholder" id="chartPlaceholder-${c.id}">更新後顯示走勢圖</div>
            <canvas id="chart-${c.id}" style="display:none;"></canvas>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function updateRangeButtons() {
      [60, 180, 365].forEach(days => {
        const btn = document.getElementById(`range${days}`);
        if (btn) btn.classList.toggle('active', selectedRangeDays === days);
      });
    }

    function sliceHistory(history, days) {
      if (!history || history.length === 0) return [];
      return history.slice(-days);
    }

    function getDisplayHistory(id) {
      const cached = dataCache[id];
      if (!cached || !cached.history) return [];
      return sliceHistory(cached.history, selectedRangeDays);
    }

    function rerenderAllCharts() {
      commodities.forEach(c => {
        const cached = dataCache[c.id];
        if (cached && cached.price !== null && cached.price !== undefined) {
          const history = getDisplayHistory(c.id);
          if (history.length > 1) {
            renderChart(c.id, history);
          }
        }
      });
    }

    async function selectRange(days) {
      if (isFetching || selectedRangeDays === days) return;

      selectedRangeDays = days;
      updateRangeButtons();

      const hasCache = Object.keys(dataCache).length > 0;
      const needsFetch = !hasCache || loadedRangeDays < days;

      if (!needsFetch) {
        rerenderAllCharts();
        document.getElementById('statusBar').textContent =
          `已切換為 ${RANGE_LABELS[days]} 走勢（使用現有資料）`;
        return;
      }

      document.getElementById('statusBar').textContent =
        `正在取得 ${RANGE_LABELS[days]} 走勢資料...`;
      await refreshAll(false);
    }

    function setCardLoading(id) {
      const priceEl = document.getElementById(`price-${id}`);
      const statusEl = document.getElementById(`status-${id}`);
      const refreshBtn = document.getElementById(`refreshBtn-${id}`);
      const dateText = document.getElementById(`dateText-${id}`);

      priceEl.className = 'card-price';
      priceEl.innerHTML = '<div class="shimmer"></div>';
      statusEl.className = 'card-status loading';
      if (refreshBtn) refreshBtn.disabled = true;
      if (dateText) dateText.textContent = '載入中...';
    }

    function updateCard(id, data) {
      const priceEl = document.getElementById(`price-${id}`);
      const statusEl = document.getElementById(`status-${id}`);
      const dateText = document.getElementById(`dateText-${id}`);
      const refreshBtn = document.getElementById(`refreshBtn-${id}`);

      if (refreshBtn) refreshBtn.disabled = false;

      if (data.price !== null && data.price !== undefined) {
        dataCache[id] = data;
        loadedRangeDays = Math.max(
          loadedRangeDays,
          data.historyDays || (data.history ? data.history.length : 0)
        );

        priceEl.className = 'card-price';
        priceEl.textContent = formatPrice(data.price);
        statusEl.className = 'card-status success';
        if (dateText) {
          const rangeLabel = RANGE_LABELS[selectedRangeDays] || `${selectedRangeDays}天`;
          dateText.textContent = data.date
            ? `數據日期：${data.date} · ${rangeLabel}`
            : `最新數據 · ${rangeLabel}`;
        }

        const history = getDisplayHistory(id);
        if (history.length > 1) {
          renderChart(id, history);
        }
      } else {
        priceEl.className = 'card-price error-text';
        priceEl.textContent = '無法取得數據';
        statusEl.className = 'card-status error';
        if (dateText) dateText.textContent = data.error || '發生錯誤';
      }
    }

    function renderChart(id, history) {
      const commodity = commodities.find(c => c.id === id);
      const color = commodity ? commodity.color : '#667eea';

      const placeholder = document.getElementById(`chartPlaceholder-${id}`);
      const canvas = document.getElementById(`chart-${id}`);
      if (!canvas) return;

      // 隱藏 placeholder，顯示 canvas
      if (placeholder) placeholder.style.display = 'none';
      canvas.style.display = 'block';

      // 銷毀舊圖表
      if (chartInstances[id]) {
        chartInstances[id].destroy();
        delete chartInstances[id];
      }

      const labels = history.map(h => h.date);
      const prices = history.map(h => h.price);

      // 計算漸層色（從透明到商品顏色）
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createLinearGradient(0, 0, 0, 130);
      gradient.addColorStop(0, hexToRgba(color, 0.35));
      gradient.addColorStop(1, hexToRgba(color, 0.02));

      chartInstances[id] = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            data: prices,
            borderColor: color,
            borderWidth: 1.5,
            backgroundColor: gradient,
            fill: true,
            pointRadius: 0,
            pointHoverRadius: 4,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 600 },
          plugins: {
            legend: { display: false },
            tooltip: {
              mode: 'index',
              intersect: false,
              backgroundColor: 'rgba(20,20,40,0.9)',
              titleColor: '#aaa',
              bodyColor: '#fff',
              titleFont: { size: 10 },
              bodyFont: { size: 12, weight: 'bold' },
              callbacks: {
                title: (items) => items[0].label,
                label: (item) => formatPrice(item.raw)
              }
            }
          },
          scales: {
            x: {
              display: false,
              grid: { display: false }
            },
            y: {
              display: true,
              position: 'right',
              grid: {
                color: 'rgba(255,255,255,0.05)',
                drawBorder: false
              },
              ticks: {
                color: '#556677',
                font: { size: 9 },
                maxTicksLimit: 4,
                callback: (v) => formatPriceShort(v)
              }
            }
          },
          interaction: {
            mode: 'nearest',
            axis: 'x',
            intersect: false
          }
        }
      });
    }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function formatPrice(price) {
      if (price >= 10000) {
        return price.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
      }
      if (price >= 1000) {
        return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
      return price.toFixed(2);
    }

    function formatPriceShort(price) {
      if (price >= 10000) return (price/1000).toFixed(1) + 'k';
      if (price >= 1000) return price.toFixed(0);
      return price.toFixed(1);
    }

    function updateProgress(done, total) {
      const pct = Math.round((done / total) * 100);
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('statusBar').textContent = `正在更新... ${done}/${total}`;
    }

    async function refreshAll(resetCache = true) {
      if (isFetching) return;
      isFetching = true;
      fetchedCount = 0;

      const btn = document.getElementById('refreshAllBtn');
      const rangeBtns = [60, 180, 365].map(d => document.getElementById(`range${d}`));
      btn.disabled = true;
      btn.textContent = '⏳ 更新中...';
      rangeBtns.forEach(b => { if (b) b.disabled = true; });

      if (resetCache) {
        Object.keys(dataCache).forEach(k => delete dataCache[k]);
        loadedRangeDays = 0;
      }

      document.getElementById('progressContainer').className = 'progress-bar-container visible';
      document.getElementById('progressBar').style.width = '0%';
      document.getElementById('statusBar').textContent =
        `開始更新（${RANGE_LABELS[selectedRangeDays]}）...`;

      commodities.forEach(c => setCardLoading(c.id));

      try {
        await window.electronAPI.fetchAll(selectedRangeDays);
        loadedRangeDays = Math.max(loadedRangeDays, selectedRangeDays);
        const now = new Date();
        document.getElementById('lastUpdate').textContent =
          `最後更新：${now.toLocaleDateString('zh-TW')} ${now.toLocaleTimeString('zh-TW')} · ${RANGE_LABELS[selectedRangeDays]}`;
        document.getElementById('statusBar').textContent =
          `✅ 更新完成（${RANGE_LABELS[selectedRangeDays]}）`;
      } catch (e) {
        document.getElementById('statusBar').textContent = '❌ 更新失敗：' + e.message;
      }

      setTimeout(() => {
        document.getElementById('progressContainer').className = 'progress-bar-container';
      }, 2000);

      btn.disabled = false;
      btn.textContent = '🔄 更新所有價格';
      rangeBtns.forEach(b => { if (b) b.disabled = false; });
      isFetching = false;
    }

    async function refreshSingle(id) {
      const refreshBtn = document.getElementById(`refreshBtn-${id}`);
      if (refreshBtn) refreshBtn.disabled = true;

      setCardLoading(id);
      document.getElementById('statusBar').textContent = `正在更新...`;

      try {
        const data = await window.electronAPI.fetchCommodity(id, selectedRangeDays);
        updateCard(id, data);
        loadedRangeDays = Math.max(
          loadedRangeDays,
          data.historyDays || (data.history ? data.history.length : 0)
        );
        document.getElementById('statusBar').textContent =
          `✅ 更新完成（${RANGE_LABELS[selectedRangeDays]}）`;
      } catch (e) {
        const priceEl = document.getElementById(`price-${id}`);
        priceEl.className = 'card-price error-text';
        priceEl.textContent = '更新失敗';
        document.getElementById(`status-${id}`).className = 'card-status error';
        document.getElementById('statusBar').textContent = '❌ 更新失敗';
        if (refreshBtn) refreshBtn.disabled = false;
      }
    }

    init();
  </script>
</body>
</html>
